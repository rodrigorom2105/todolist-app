<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List App</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary shadow-sm">
      <div class="container">
        <span class="navbar-brand fw-bold fs-4">
          ✅ Todo List App
        </span>
        <button
          class="btn btn-light btn-sm fw-semibold"
          data-bs-toggle="modal"
          data-bs-target="#taskModal">
          + New Task
        </button>
      </div>
    </nav>

    <!-- Main content -->
    <main class="container my-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="text-muted mb-0" id="task-count">Loading tasks...</h5>
      </div>

      <div id="task-list" class="d-flex flex-column gap-2">
        <!-- Tasks rendered here -->
      </div>

      <p id="empty-msg" class="text-center text-muted mt-5 d-none">
        No tasks yet. Create one with the <strong>+ New Task</strong> button.
      </p>
    </main>

    <!-- Create Task Modal -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title" id="taskModalLabel">New Task</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <form id="task-form">
            <div class="modal-body d-flex flex-column gap-3">
              <div>
                <label for="task-title" class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
                <input
                  type="text"
                  id="task-title"
                  class="form-control"
                  placeholder="What needs to be done?"
                  required />
              </div>
              <div>
                <label for="task-description" class="form-label fw-semibold">Description</label>
                <textarea
                  id="task-description"
                  class="form-control"
                  rows="2"
                  placeholder="Optional details..."></textarea>
              </div>
              <div>
                <label for="task-due-date" class="form-label fw-semibold">Due Date</label>
                <input type="date" id="task-due-date" class="form-control" />
              </div>
              <div id="form-error" class="alert alert-danger d-none py-2" role="alert"></div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Create Task</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
